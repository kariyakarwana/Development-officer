<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>පද්ධතියට ඇතුළුවීම | Login</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-login { background: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-login:hover { background: #2980b9; }
        .error-msg { color: #c0392b; background: #fde8e7; padding: 10px; border-radius: 4px; text-align: center; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔑 System Login</h2>
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form action="/login" method="POST">
        <div class="form-group">
            <label>Username / පරිශීලක නාමය</label>
            <input type="text" name="username" required autocomplete="off">
        </div>
        <div class="form-group">
            <label>Password / මුරපදය</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-login">Login / ඇතුළු වන්න</button>
    </form>
</div>
</body>
</html>
